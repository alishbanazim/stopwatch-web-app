<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Watch</title>
    <!-- link css file  -->
    <link rel="stylesheet" href="./style.css">
    <!-- icon  -->
    <link rel="icon" href="./images/clock.jpg">
    <!-- google fonts inter  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Fira+Code:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jost:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- font-awesome CDN  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>


<body>
    <!-- logo of website  -->
    <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/3208/3208749.png" alt="logo">
        <h1>Stop Watch</h1>
    </div>
    <!-- theme changing  -->
    <button class="themeBtn">
        <i class="fa-solid fa-moon"></i>
    </button>
    <!-- Showing current date and time  -->
    <header class="header">
        <h2 id="currentTime">
            00 : 00 : 00
        </h2>
        <p id="currentDate">
            jun 26,2005
        </p>
    </header>
    <!-- digital stop watch  -->
    <main>
        <div class="container">
            <div class="time">
                <h1 class="timer">
                    00: 00 : 00
                </h1>
            </div>
            <div class="button">
                <button class="start">
                    <i class="fa-solid fa-play"></i>
                    Start
                </button>
                <button class="pause">
                    <i class="fa-solid fa-pause"></i>
                    Pause
                </button>
                <button class="restart">
                    <i class="fa-solid fa-rotate-left"> </i>
                    Restart
                </button>
            </div>
        </div>
    </main>
    <script src="./script.js"></script>
</body>

</html>
